services:
  postgres:
    image: postgres:17-alpine
    container_name: odontaval-postgres
    ports:
      - "2345:5432"
    env_file:
      - ./../.env
    restart: on-failure:2
    networks:
      - app
    volumes:
      - odontaval_data:/var/lib/postgresql/data

  back:
    build: ./../
    container_name: odontaval-back
    env_file:
      - ./../.env
    ports:
      - "8081:8081"
    restart: on-failure:2
    depends_on:
      - postgres
    networks:
      - app
    command: [ "--seed" ]

volumes:
  odontaval_data:

networks:
  app: